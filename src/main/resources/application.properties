spring.datasource.url=jdbc:h2:mem:motorsense;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

spring.h2.console.enabled=true
spring.h2.console.path=/h2

server.port=8080
server.address=0.0.0.0

llm.api.url=https://openrouter.ai/api/v1/chat/completions
llm.api.key=${OPENROUTER_API_KEY}
llm.model=openai/gpt-4o-mini
llm.site.url=http://localhost:8080
llm.site.name=MotorSense